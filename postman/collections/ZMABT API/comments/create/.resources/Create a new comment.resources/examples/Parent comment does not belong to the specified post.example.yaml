$kind: http-example
request:
  url: "{{baseUrl}}/comments/create"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "content": "string",
        "postId": 8497,
        "commentId": 9296
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  body:
    type: text
    content: ""
order: 3000
