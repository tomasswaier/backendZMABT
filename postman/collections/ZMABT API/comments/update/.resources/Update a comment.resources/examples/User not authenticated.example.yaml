$kind: http-example
request:
  url: "{{baseUrl}}/comments/update"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "commentId": 8948,
        "content": "string"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  body:
    type: text
    content: ""
order: 2000
