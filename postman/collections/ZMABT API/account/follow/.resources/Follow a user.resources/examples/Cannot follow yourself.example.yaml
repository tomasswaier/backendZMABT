$kind: http-example
request:
  url: "{{baseUrl}}/account/follow"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "userId": 5842
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: text
    content: ""
order: 2000
