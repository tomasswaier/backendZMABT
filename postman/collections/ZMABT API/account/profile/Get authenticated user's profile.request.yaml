$kind: http-request
url: "{{baseUrl}}/account/profile"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Get authenticated user's profile.resources/examples
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", () => {
        pm.response.to.have.status(200);
      });
      pm.test("Response time is less than 2000ms", () => {
        pm.expect(pm.response.responseTime).to.be.below(2000);
      });
      pm.test("Response is JSON", () => {
        pm.response.to.be.json;
      });
      pm.test("Profile object is returned", () => {
        pm.expect(pm.response.json()).to.be.an("object");
      });
      pm.test("Not unauthorized (401)", () => {
        pm.expect(pm.response.code).to.not.equal(401);
      });
