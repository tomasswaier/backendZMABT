$kind: http-request
url: "{{baseUrl}}/posts/getPageFyp?page=4550"
method: GET
queryParams:
  page: "4550"
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Get FYP posts.resources/examples
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", () => {
        pm.response.to.have.status(200);
      });
      pm.test("Response time is less than 2000ms", () => {
        pm.expect(pm.response.responseTime).to.be.below(2000);
      });
      pm.test("Response is JSON", () => {
        pm.response.to.be.json;
      });
      pm.test("FYP posts response is an array or object", () => {
        const json = pm.response.json();
        pm.expect(json).to.satisfy((v) => Array.isArray(v) || typeof v === "object");
      });
