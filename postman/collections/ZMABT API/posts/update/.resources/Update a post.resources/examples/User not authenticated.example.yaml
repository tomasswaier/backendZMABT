$kind: http-example
request:
  url: "{{baseUrl}}/posts/update"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "postId": 7655,
        "postText": "string",
        "rating": 4
      }
response:
  statusCode: 401
  statusText: Unauthorized
  body:
    type: text
    content: ""
order: 2000
