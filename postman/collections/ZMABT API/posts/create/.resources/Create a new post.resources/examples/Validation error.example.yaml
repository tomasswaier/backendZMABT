$kind: http-example
request:
  url: "{{baseUrl}}/posts/create"
  method: PUT
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "postText": "string",
        "rating": 3,
        "longitude": 632.7309020646398,
        "latitude": 5678.649860816818
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: text
    content: ""
order: 2000
